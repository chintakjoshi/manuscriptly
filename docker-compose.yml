services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kaka_writer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kaka_writer"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "0"
      CORS_ORIGINS: http://localhost:5173
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/kaka_writer
      SEED_DEFAULT_SUPERUSER: "1"
      DEFAULT_SUPERUSER_USER_NAME: admin
      DEFAULT_SUPERUSER_EMAIL: admin@example.com
      DEFAULT_SUPERUSER_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python -m alembic upgrade head && python run.py"
    ports:
      - "8000:8000"
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped
  adminer:
    image: adminer:4
    container_name: adminer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
